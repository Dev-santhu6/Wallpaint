<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WallVision — Live Paint Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0b0e;--surface:#13151a;--border:#1e2230;
  --accent:#f0c060;--txt:#f0ede8;--sub:#7a7d8a;
  --sh:0 4px 24px rgba(0,0,0,.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);}

/* ── FULL SCREEN LAYOUT ── */
#app{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── VIDEO / CANVAS STACK ── */
#viewport{
  position:relative;flex:1;overflow:hidden;
  background:#000;
}
#video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
#overlay{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#overlay.visible{opacity:1;}

/* Tap ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(240,192,96,.5);
  width:60px;height:60px;
  transform:translate(-50%,-50%) scale(0);
  animation:rip .5s ease-out forwards;
  pointer-events:none;z-index:20;
}
@keyframes rip{to{transform:translate(-50%,-50%) scale(3);opacity:0;}}

/* Painted indicator */
#paint-ring{
  position:absolute;border-radius:50%;
  border:3px solid rgba(240,192,96,.9);
  width:80px;height:80px;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;z-index:21;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:none;
}
#paint-ring.show{transform:translate(-50%,-50%) scale(1);}

/* Tap hint */
#tap-hint{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  z-index:15;pointer-events:none;
  transition:opacity .4s;
}
#tap-hint.hidden{opacity:0;}
.hint-circle{
  width:72px;height:72px;border-radius:50%;
  border:2.5px solid rgba(240,192,96,.7);
  display:flex;align-items:center;justify-content:center;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.1);opacity:1;}}
.hint-icon{font-size:30px;}
.hint-text{font-size:13px;font-weight:500;color:rgba(240,192,96,.9);letter-spacing:.5px;text-align:center;line-height:1.5;}

/* Camera off state */
#cam-off{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:var(--bg);z-index:50;
}
#cam-off.hidden{display:none;}
.cam-off-icon{font-size:56px;opacity:.4;}
.cam-off-text{font-size:15px;color:var(--sub);text-align:center;max-width:260px;line-height:1.6;}
.cam-btn{
  padding:12px 28px;background:var(--accent);color:#1a1200;
  border:none;border-radius:50px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all .18s;letter-spacing:.3px;
}
.cam-btn:hover{opacity:.9;transform:translateY(-1px);}

/* ── TOP BAR ── */
#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 14px;
  background:linear-gradient(to bottom,rgba(10,11,14,.85),transparent);
  z-index:30;
  backdrop-filter:blur(0px);
}
.brand{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.brand span{color:var(--accent);}
.top-btns{display:flex;gap:8px;}
.tb{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all .18s;
}
.tb:hover{background:rgba(255,255,255,.22);}
.tb.active{background:rgba(240,192,96,.25);border-color:rgba(240,192,96,.5);}

/* ── COLOR INFO BADGE ── */
#color-badge{
  position:absolute;top:80px;right:16px;
  background:rgba(19,21,26,.9);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:16px;
  padding:12px 14px;min-width:140px;
  z-index:30;
  transform:translateX(160px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
#color-badge.show{transform:translateX(0);}
.cb-swatch{width:100%;height:44px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,.1);}
.cb-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px;}
.cb-hex{font-size:11px;color:var(--sub);font-family:'Courier New',monospace;}
.cb-brand{font-size:10px;color:var(--accent);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:4px;}

/* ── BOTTOM PANEL ── */
#bottom{
  position:absolute;bottom:0;left:0;right:0;
  z-index:30;
  background:linear-gradient(to top,rgba(10,11,14,.97) 70%,transparent);
  padding:12px 0 24px;
}

/* Mode tabs */
.mode-tabs{display:flex;justify-content:center;gap:6px;margin-bottom:14px;padding:0 16px;}
.mt{
  padding:7px 18px;border-radius:50px;
  font-size:12px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:transparent;
  color:var(--sub);transition:all .2s;font-family:'Outfit',sans-serif;
  letter-spacing:.3px;
}
.mt.on{background:var(--accent);color:#1a1200;border-color:var(--accent);}

/* Color palette row */
#palette-row{
  display:flex;gap:0;overflow-x:auto;padding:0 16px 4px;
  scrollbar-width:none;scroll-behavior:smooth;
}
#palette-row::-webkit-scrollbar{display:none;}

.color-chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  min-width:54px;cursor:pointer;padding:4px 3px;
  flex-shrink:0;transition:transform .15s;
}
.color-chip:active{transform:scale(.92);}
.chip-dot{
  width:38px;height:38px;border-radius:50%;
  border:2.5px solid transparent;
  transition:all .2s;position:relative;flex-shrink:0;
}
.color-chip.selected .chip-dot{
  border-color:white;
  transform:scale(1.18);
  box-shadow:0 0 0 2px rgba(240,192,96,.6),0 4px 14px rgba(0,0,0,.4);
}
.chip-name{font-size:8.5px;color:var(--sub);text-align:center;font-weight:500;line-height:1.2;max-width:52px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.color-chip.selected .chip-name{color:var(--txt);}

/* Category divider */
.cat-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:30px;flex-shrink:0;
}
.cat-line{width:1px;flex:1;background:var(--border);}
.cat-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--border);padding:3px 0;writing-mode:vertical-rl;text-orientation:mixed;}

/* Opacity + tools row */
.tools-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 0;
}
.tool-btn{
  padding:8px 14px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:rgba(255,255,255,.04);
  color:var(--txt);transition:all .18s;font-family:'Outfit',sans-serif;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.tool-btn.danger{border-color:rgba(239,68,68,.4);color:#ef4444;}
.tool-btn.danger:hover{background:rgba(239,68,68,.1);}

.opacity-wrap{flex:1;display:flex;align-items:center;gap:8px;}
.op-label{font-size:10px;color:var(--sub);font-weight:500;white-space:nowrap;}
#opacity-slider{
  flex:1;-webkit-appearance:none;height:3px;
  background:var(--border);border-radius:3px;outline:none;cursor:pointer;
}
#opacity-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;
  box-shadow:0 1px 6px rgba(0,0,0,.4);
}
.op-val{font-size:11px;font-weight:700;color:var(--accent);min-width:30px;font-family:'Courier New',monospace;}

/* Processing flash */
#processing{
  position:absolute;inset:0;background:rgba(240,192,96,.06);
  z-index:25;pointer-events:none;opacity:0;transition:opacity .1s;
}
#processing.flash{opacity:1;}

/* Toast */
#toast{
  position:absolute;top:80px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:rgba(240,192,96,.95);color:#1a1200;
  padding:9px 20px;border-radius:50px;
  font-size:12px;font-weight:700;
  opacity:0;transition:all .25s;z-index:50;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Painted layers counter */
#layer-count{
  position:absolute;top:80px;left:16px;
  background:rgba(19,21,26,.85);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:50px;
  padding:6px 12px;font-size:11px;font-weight:600;
  color:var(--sub);z-index:30;transition:all .3s;
}
#layer-count span{color:var(--accent);}
</style>
</head>
<body>
<div id="app">

  <!-- CAMERA OFF STATE -->
  <div id="cam-off">
    <div class="cam-off-icon">📷</div>
    <div class="cam-off-text">Point your camera at a wall to preview paint colors in real time</div>
    <button class="cam-btn" onclick="startCamera()">Open Camera</button>
  </div>

  <!-- VIEWPORT -->
  <div id="viewport" onclick="handleTap(event)">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="paint-ring"></div>
    <div id="tap-hint" id="tap-hint">
      <div class="hint-circle"><div class="hint-icon">👆</div></div>
      <div class="hint-text">Tap any wall area<br>to preview paint color</div>
    </div>
    <div id="processing"></div>
  </div>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="brand">Wall<span>Vision</span></div>
    <div class="top-btns">
      <div class="tb" id="flash-btn" onclick="toggleFlash()" title="Flash">🔦</div>
      <div class="tb" onclick="flipCamera()" title="Flip camera">🔄</div>
      <div class="tb" onclick="savePhoto()" title="Save">📸</div>
    </div>
  </div>

  <!-- COLOR INFO BADGE -->
  <div id="color-badge">
    <div class="cb-swatch" id="cb-swatch"></div>
    <div class="cb-name" id="cb-name">Ivory White</div>
    <div class="cb-hex" id="cb-hex">#F5F0E8</div>
    <div class="cb-brand" id="cb-brand">Classic Collection</div>
  </div>

  <!-- LAYER COUNT -->
  <div id="layer-count">Painted areas: <span id="lc-num">0</span></div>

  <!-- BOTTOM PANEL -->
  <div id="bottom">

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mt on" onclick="setMode('colors',this)">🎨 Paint Colors</button>
      <button class="mt" onclick="setMode('whites',this)">🤍 Whites</button>
      <button class="mt" onclick="setMode('bold',this)">🔥 Bold</button>
      <button class="mt" onclick="setMode('nature',this)">🌿 Nature</button>
      <button class="mt" onclick="setMode('custom',this)">✏️ Custom</button>
    </div>

    <!-- Color chips -->
    <div id="palette-row"></div>

    <!-- Tools -->
    <div class="tools-row">
      <div class="opacity-wrap">
        <span class="op-label">Opacity</span>
        <input type="range" id="opacity-slider" min="20" max="95" value="72" oninput="setOpacity(this.value)">
        <span class="op-val" id="op-val">72%</span>
      </div>
      <button class="tool-btn" onclick="undoLast()">↩ Undo</button>
      <button class="tool-btn danger" onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// COLOR PALETTES
// ═══════════════════════════════════════════════
const PALETTES = {
  colors: [
    // Neutrals
    {n:'Ivory White',h:'#F5F0E8',b:'Classic'},
    {n:'Warm Linen',h:'#EDE4D0',b:'Classic'},
    {n:'Parchment',h:'#E8D8B8',b:'Classic'},
    {n:'Soft Sand',h:'#D4C4A0',b:'Classic'},
    {n:'Stone Gray',h:'#B8B0A4',b:'Classic'},
    {n:'Driftwood',h:'#A89880',b:'Classic'},
    // Blues
    {n:'Sky Mist',h:'#C8D8E8',b:'Calm'},
    {n:'Pale Blue',h:'#A8C4D8',b:'Calm'},
    {n:'Ocean Haze',h:'#7EA8C4',b:'Calm'},
    {n:'Slate Blue',h:'#5A84A8',b:'Calm'},
    {n:'Navy Dusk',h:'#2A4A6A',b:'Calm'},
    {n:'Midnight',h:'#1A2C42',b:'Calm'},
    // Greens
    {n:'Sage Mist',h:'#C8D8C0',b:'Nature'},
    {n:'Mint Cream',h:'#B0CCA8',b:'Nature'},
    {n:'Fern',h:'#88AA80',b:'Nature'},
    {n:'Forest',h:'#486040',b:'Nature'},
    {n:'Moss',h:'#5A6848',b:'Nature'},
    {n:'Olive',h:'#7A7848',b:'Nature'},
    // Warm
    {n:'Blush Rose',h:'#E8C8C0',b:'Warm'},
    {n:'Dusty Pink',h:'#D8A8A0',b:'Warm'},
    {n:'Terracotta',h:'#C87858',b:'Warm'},
    {n:'Burnt Sienna',h:'#A85838',b:'Warm'},
    {n:'Rust',h:'#904030',b:'Warm'},
    {n:'Burgundy',h:'#6A2828',b:'Warm'},
  ],
  whites: [
    {n:'Pure White',h:'#FFFFFF',b:'White'},
    {n:'Snow',h:'#F8F8F8',b:'White'},
    {n:'Ivory',h:'#F5F0E8',b:'White'},
    {n:'Cream',h:'#F0E8D0',b:'White'},
    {n:'Antique White',h:'#FAEBD7',b:'White'},
    {n:'Linen',h:'#EDE4D0',b:'White'},
    {n:'Warm White',h:'#F5ECD8',b:'White'},
    {n:'Pearl',h:'#EEEAE4',b:'White'},
    {n:'Alabaster',h:'#F2EEE0',b:'White'},
    {n:'Parchment',h:'#E8D8B8',b:'White'},
    {n:'Off White',h:'#F0EDE5',b:'White'},
    {n:'Cloud',h:'#EEF0F2',b:'White'},
  ],
  bold: [
    {n:'Fire Red',h:'#C42020',b:'Bold'},
    {n:'Crimson',h:'#A01020',b:'Bold'},
    {n:'Cobalt',h:'#1040A0',b:'Bold'},
    {n:'Royal Blue',h:'#2050C8',b:'Bold'},
    {n:'Emerald',h:'#208050',b:'Bold'},
    {n:'Jade',h:'#108060',b:'Bold'},
    {n:'Marigold',h:'#E8A010',b:'Bold'},
    {n:'Saffron',h:'#D87010',b:'Bold'},
    {n:'Plum',h:'#702060',b:'Bold'},
    {n:'Eggplant',h:'#4A1050',b:'Bold'},
    {n:'Charcoal',h:'#2A2A2A',b:'Bold'},
    {n:'Jet Black',h:'#101010',b:'Bold'},
  ],
  nature: [
    {n:'Sage',h:'#8AAA80',b:'Nature'},
    {n:'Eucalyptus',h:'#70A090',b:'Nature'},
    {n:'Sea Foam',h:'#90C0B0',b:'Nature'},
    {n:'Reed',h:'#C0A870',b:'Nature'},
    {n:'Clay',h:'#B87850',b:'Nature'},
    {n:'Sandstone',h:'#C8A878',b:'Nature'},
    {n:'Desert',h:'#D4A070',b:'Nature'},
    {n:'Bark',h:'#806050',b:'Nature'},
    {n:'Dune',h:'#D8C090',b:'Nature'},
    {n:'Slate',h:'#708090',b:'Nature'},
    {n:'Pebble',h:'#A09888',b:'Nature'},
    {n:'Storm',h:'#607080',b:'Nature'},
  ],
  custom: [],
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let stream = null;
let facingMode = 'environment';
let currentColor = { n: 'Ivory White', h: '#F5F0E8', b: 'Classic' };
let opacity = 0.72;
let currentMode = 'colors';
let layers = []; // [{x,y,color,opacity,pixels}]
let animFrame = null;
let videoReady = false;
let torch = false;

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d', { willReadFrequently: true });

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('cam-off').classList.add('hidden');
      videoReady = true;
      resizeCanvas();
      startRender();
      toast('Camera ready — tap a wall to paint!');
    };
  } catch(e) {
    document.querySelector('.cam-off-text').textContent = 'Camera access denied. Please allow camera permission and try again.';
    toast('Camera permission denied');
  }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if(stream) { stream.getTracks().forEach(t => t.stop()); }
  layers = [];
  updateLayerCount();
  await startCamera();
}

async function toggleFlash() {
  const track = stream?.getVideoTracks()[0];
  if (!track) return;
  try {
    torch = !torch;
    await track.applyConstraints({ advanced: [{ torch }] });
    document.getElementById('flash-btn').classList.toggle('active', torch);
    toast(torch ? 'Flash on' : 'Flash off');
  } catch(e) { toast('Flash not supported on this device'); }
}

function resizeCanvas() {
  const vp = document.getElementById('viewport');
  overlay.width = vp.clientWidth;
  overlay.height = vp.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); redrawAll(); });

// ═══════════════════════════════════════════════
// RENDER LOOP — overlay canvas on top of video
// ═══════════════════════════════════════════════
function startRender() {
  // Continuous render for live feel
  function loop() {
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

// ═══════════════════════════════════════════════
// TAP HANDLER — the magic happens here
// ═══════════════════════════════════════════════
function handleTap(e) {
  if (!videoReady) return;

  const rect = document.getElementById('viewport').getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;

  // Ripple effect
  showRipple(x, y);
  // Hide hint
  document.getElementById('tap-hint').classList.add('hidden');

  // Show processing flash
  const proc = document.getElementById('processing');
  proc.classList.add('flash');
  setTimeout(() => proc.classList.remove('flash'), 120);

  // Capture current video frame
  const offscreen = document.createElement('canvas');
  offscreen.width = overlay.width;
  offscreen.height = overlay.height;
  const octx = offscreen.getContext('2d');

  // Draw video frame scaled to canvas size
  octx.drawImage(video, 0, 0, offscreen.width, offscreen.height);

  // Get pixel data
  const imageData = octx.getImageData(0, 0, offscreen.width, offscreen.height);
  const data = imageData.data;
  const W = offscreen.width, H = offscreen.height;

  const ix = Math.round(x), iy = Math.round(y);
  if (ix < 0 || ix >= W || iy < 0 || iy >= H) return;

  // Sample target color at tap point
  const idx = (iy * W + ix) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2];

  // Flood fill with color tolerance
  const fillColor = hexToRgb(currentColor.h);
  const tolerance = 38;
  const visited = new Uint8Array(W * H);
  const filled = [];

  // BFS flood fill
  const queue = [ix + iy * W];
  visited[ix + iy * W] = 1;

  while (queue.length > 0) {
    const pos = queue.shift();
    const px = pos % W, py = Math.floor(pos / W);

    filled.push(pos);

    // Check 4 neighbors
    const neighbors = [
      px > 0 ? pos - 1 : -1,
      px < W-1 ? pos + 1 : -1,
      py > 0 ? pos - W : -1,
      py < H-1 ? pos + W : -1,
    ];

    for (const n of neighbors) {
      if (n < 0 || visited[n]) continue;
      const ni = n * 4;
      const dr = data[ni] - targetR;
      const dg = data[ni+1] - targetG;
      const db = data[ni+2] - targetB;
      const diff = Math.sqrt(dr*dr + dg*dg + db*db);
      if (diff < tolerance) {
        visited[n] = 1;
        queue.push(n);
      }
    }
  }

  // Store layer
  const layer = {
    x: ix, y: iy,
    color: currentColor.h,
    opacity: opacity,
    pixels: filled,
    W, H,
  };
  layers.push(layer);
  updateLayerCount();

  // Draw this layer
  drawLayer(layer);

  // Paint ring indicator
  showPaintRing(x, y);

  toast(`🎨 ${currentColor.n} applied — ${filled.length.toLocaleString()} pixels painted`);
}

function drawLayer(layer) {
  const { pixels, color, opacity: op, W, H } = layer;
  if (pixels.length === 0) return;

  const rgb = hexToRgb(color);

  // Get current canvas image data
  const imageData = ctx.getImageData(0, 0, overlay.width, overlay.height);
  const data = imageData.data;

  // Scale factor if canvas size differs from capture size
  const scaleX = overlay.width / W;
  const scaleY = overlay.height / H;

  for (const pos of pixels) {
    const px = pos % W, py = Math.floor(pos / W);
    const cx = Math.round(px * scaleX), cy = Math.round(py * scaleY);
    if (cx >= overlay.width || cy >= overlay.height) continue;
    const ci = (cy * overlay.width + cx) * 4;
    // Blend with existing
    data[ci]   = Math.round(data[ci]   * (1 - op) + rgb.r * op);
    data[ci+1] = Math.round(data[ci+1] * (1 - op) + rgb.g * op);
    data[ci+2] = Math.round(data[ci+2] * (1 - op) + rgb.b * op);
    data[ci+3] = Math.round(255 * Math.min(op + 0.15, 1));
  }

  ctx.putImageData(imageData, 0, 0);
  overlay.classList.add('visible');
}

function redrawAll() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (layers.length === 0) {
    overlay.classList.remove('visible');
    return;
  }
  for (const layer of layers) drawLayer(layer);
}

// ═══════════════════════════════════════════════
// UI ACTIONS
// ═══════════════════════════════════════════════
function undoLast() {
  if (layers.length === 0) { toast('Nothing to undo'); return; }
  layers.pop();
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  redrawAll();
  updateLayerCount();
  if (layers.length === 0) overlay.classList.remove('visible');
  toast('↩ Undone');
}

function clearAll() {
  layers = [];
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  overlay.classList.remove('visible');
  updateLayerCount();
  document.getElementById('tap-hint').classList.remove('hidden');
  toast('🗑 Cleared all paint');
}

function setOpacity(val) {
  opacity = val / 100;
  document.getElementById('op-val').textContent = val + '%';
}

function savePhoto() {
  // Composite video + overlay into download
  const save = document.createElement('canvas');
  save.width = overlay.width;
  save.height = overlay.height;
  const sctx = save.getContext('2d');
  sctx.drawImage(video, 0, 0, save.width, save.height);
  sctx.drawImage(overlay, 0, 0);
  const link = document.createElement('a');
  link.download = `wallvision-${currentColor.n.replace(/\s/g,'-')}.png`;
  link.href = save.toDataURL('image/png');
  link.click();
  toast('📸 Photo saved!');
}

// ═══════════════════════════════════════════════
// PALETTE RENDERING
// ═══════════════════════════════════════════════
function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mt').forEach(b => b.classList.remove('on'));
  el.classList.add('on');

  if (mode === 'custom') {
    renderCustom();
  } else {
    renderPalette(PALETTES[mode]);
  }
}

function renderPalette(colors) {
  const row = document.getElementById('palette-row');
  row.innerHTML = '';
  colors.forEach((c, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (currentColor.h === c.h ? ' selected' : '');
    chip.innerHTML = `<div class="chip-dot" style="background:${c.h}"></div><div class="chip-name">${c.n}</div>`;
    chip.onclick = () => selectColor(c, chip);
    row.appendChild(chip);
  });
}

function renderCustom() {
  const row = document.getElementById('palette-row');
  row.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:4px 0;min-width:200px;">
      <label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;">
        <input type="color" id="custom-color" value="${currentColor.h}" 
               style="width:44px;height:44px;border-radius:50%;border:2.5px solid white;cursor:pointer;background:none;padding:0;"
               oninput="applyCustomColor(this.value)">
        <span style="font-size:8.5px;color:var(--sub);">Pick Color</span>
      </label>
      <div style="font-size:12px;color:var(--sub);line-height:1.5;">Choose any custom<br>color to preview</div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:0 12px;min-width:100px;gap:4px;">
      <div style="font-size:11px;font-weight:600;" id="custom-name">${currentColor.n}</div>
      <div style="font-size:10px;color:var(--sub);font-family:monospace;" id="custom-hex-lbl">${currentColor.h}</div>
    </div>
  `;
}

function applyCustomColor(hex) {
  currentColor = { n: 'Custom', h: hex, b: 'Custom' };
  document.getElementById('custom-name').textContent = 'Custom Color';
  document.getElementById('custom-hex-lbl').textContent = hex;
  updateBadge();
}

function selectColor(c, chipEl) {
  currentColor = c;
  document.querySelectorAll('.color-chip').forEach(el => el.classList.remove('selected'));
  chipEl.classList.add('selected');
  updateBadge();
  // Show badge
  document.getElementById('color-badge').classList.add('show');
  setTimeout(() => document.getElementById('color-badge').classList.remove('show'), 3000);
  toast(`Selected: ${c.n}`);
}

function updateBadge() {
  document.getElementById('cb-swatch').style.background = currentColor.h;
  document.getElementById('cb-name').textContent = currentColor.n;
  document.getElementById('cb-hex').textContent = currentColor.h;
  document.getElementById('cb-brand').textContent = currentColor.b + ' Collection';
}

// ═══════════════════════════════════════════════
// VISUAL FX
// ═══════════════════════════════════════════════
function showRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.background = currentColor.h + '88';
  document.getElementById('viewport').appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function showPaintRing(x, y) {
  const ring = document.getElementById('paint-ring');
  ring.style.left = x + 'px';
  ring.style.top = y + 'px';
  ring.style.borderColor = currentColor.h;
  ring.style.display = 'block';
  ring.classList.add('show');
  setTimeout(() => {
    ring.classList.remove('show');
    setTimeout(() => ring.style.display = 'none', 300);
  }, 1000);
}

function updateLayerCount() {
  document.getElementById('lc-num').textContent = layers.length;
  document.getElementById('layer-count').style.borderColor = layers.length > 0 ? currentColor.h + '60' : 'var(--border)';
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Touch support
document.getElementById('viewport').addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.touches[0]);
}, { passive: false });

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderPalette(PALETTES.colors);
updateBadge();

// Select first color
if (PALETTES.colors.length > 0) {
  setTimeout(() => {
    const first = document.querySelector('.color-chip');
    if (first) first.classList.add('selected');
  }, 100);
}
</script>
</body>
</html>
